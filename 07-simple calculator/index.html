<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      items-center: center;
      justify-content: center;
      align-items: center;
      background-color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .calculator-card {
      background-color: #ffffff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 320px;
      border: 1px solid #e2e8f0;
    }

    h1 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: #1e293b;
      letter-spacing: 0.05em;
    }

    #display {
      width: 100%;
      margin-bottom: 16px;
      padding: 12px;
      text-align: right;
      background-color: #0f172a;
      color: #4ade80;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1.5rem;
      border-radius: 12px;
      border: none;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-cols: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-num {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    .btn-num:hover {
      background-color: #cbd5e1;
    }

    .btn-clear {
      background-color: #ef4444;
      color: #ffffff;
    }

    .btn-clear:hover {
      background-color: #dc2626;
    }

    .btn-op {
      background-color: #f59e0b;
      color: #ffffff;
    }

    .btn-op:hover {
      background-color: #d97706;
    }

    .btn-equal {
      grid-row: span 2;
      background-color: #10b981;
      color: #ffffff;
      font-size: 1.25rem;
    }

    .btn-equal:hover {
      background-color: #059669;
    }

    .col-span-2 {
      grid-column: span 2;
    }

    #lastResult {
      font-size: 0.75rem;
      margin-top: 16px;
      color: #64748b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      min-height: 1rem;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="calculator-card">
    <h1>🧮 CALCULATOR</h1>

    <input
      type="text"
      id="display"
      placeholder="0"
      readonly
    />

    <div class="grid">
      <button data-value="C" class="btn-clear">C</button>
      <button data-value="/" class="btn-op">÷</button>
      <button data-value="*" class="btn-op">×</button>
      <button data-value="-" class="btn-op">−</button>

      <button data-value="7" class="btn-num">7</button>
      <button data-value="8" class="btn-num">8</button>
      <button data-value="9" class="btn-num">9</button>
      <button data-value="+" class="btn-op">+</button>

      <button data-value="4" class="btn-num">4</button>
      <button data-value="5" class="btn-num">5</button>
      <button data-value="6" class="btn-num">6</button>
      <button data-value="=" class="btn-equal">=</button>

      <button data-value="1" class="btn-num">1</button>
      <button data-value="2" class="btn-num">2</button>
      <button data-value="3" class="btn-num">3</button>

      <button data-value="0" class="btn-num col-span-2">0</button>
      <button data-value="." class="btn-num">.</button>
    </div>

    <p id="lastResult"></p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const display = document.getElementById("display");
      const lastResult = document.getElementById("lastResult");
      const buttons = document.querySelectorAll("button");

      let currentInput = "";
      let isEvaluationDone = false;

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          const value = button.getAttribute("data-value");

          if (value === "C") {
            currentInput = "";
            display.value = "";
            lastResult.textContent = "";
          } else if (value === "=") {
            if (currentInput.trim() === "") return;
            
            try {
              const result = new Function(`return ${currentInput}`)();
              const formattedResult = Number(result.toFixed(8)).toString();
              
              lastResult.textContent = `${currentInput} =`;
              display.value = formattedResult;
              currentInput = formattedResult;
              isEvaluationDone = true;
            } catch (error) {
              display.value = "Error";
              currentInput = "";
            }
          } else {
            if (isEvaluationDone && !isNaN(value)) {
              currentInput = "";
            }
            isEvaluationDone = false;

            const lastChar = currentInput.slice(-1);
            if (["+", "-", "*", "/"].includes(value) && ["+", "-", "*", "/"].includes(lastChar)) {
              currentInput = currentInput.slice(0, -1) + value;
            } else {
              currentInput += value;
            }

            display.value = currentInput
              .replace(/\*/g, "×")
              .replace(/\//g, "÷");
          }
        });
      });
    });
  </script>

</body>
</html>
