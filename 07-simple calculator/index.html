<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .calculator-container {
      background-color: #1e293b;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 0px 0px rgba(255, 255, 255, 0.1);
      width: 340px;
      border: 1px solid #334155;
    }

    h1 {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: #94a3b8;
      letter-spacing: 0.15em;
    }

    .screen-wrapper {
      background-color: #0f172a;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 24px;
      border: 1px solid #334155;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    #lastResult {
      font-size: 0.85rem;
      color: #64748b;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      min-height: 1.2rem;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #display {
      width: 100%;
      text-align: right;
      background: transparent;
      color: #38bdf8;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 2rem;
      font-weight: 500;
      border: none;
      outline: none;
      margin-top: 4px;
    }

    #display::placeholder {
      color: #1e293b;
    }

    .grid {
      display: grid;
      grid-template-cols: repeat(4, 1fr);
      gap: 14px;
    }

    button {
      outline: none;
      padding: 20px;
      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:active {
      transform: scale(0.92);
    }

    .btn-num {
      background-color: #334155;
      color: #f8fafc;
      box-shadow: 0 4px 0px #1e293b;
    }

    .btn-num:hover {
      background-color: #475569;
    }

    .btn-clear {
      background-color: #ef4444;
      color: #ffffff;
      box-shadow: 0 4px 0px #991b1b;
    }

    .btn-clear:hover {
      background-color: #f87171;
    }

    .btn-op {
      background-color: #f59e0b;
      color: #ffffff;
      box-shadow: 0 4px 0px #b45309;
    }

    .btn-op:hover {
      background-color: #fbbf24;
    }

    .btn-equal {
      grid-row: span 2;
      background-color: #0ea5e9;
      color: #ffffff;
      font-size: 1.5rem;
      box-shadow: 0 4px 0px #0369a1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-equal:hover {
      background-color: #38bdf8;
    }

    .col-span-2 {
      grid-column: span 2;
    }
  </style>
</head>

<body>

  <div class="calculator-container">
    <h1>STANDARD CALCULATOR</h1>

    <div class="screen-wrapper">
      <p id="lastResult"></p>
      <input type="text" id="display" placeholder="0" readonly />
    </div>

    <div class="grid">
      <button data-value="C" class="btn-clear">C</button>
      <button data-value="/" class="btn-op">÷</button>
      <button data-value="*" class="btn-op">×</button>
      <button data-value="-" class="btn-op">−</button>

      <button data-value="7" class="btn-num">7</button>
      <button data-value="8" class="btn-num">8</button>
      <button data-value="9" class="btn-num">9</button>
      <button data-value="+" class="btn-op">+</button>

      <button data-value="4" class="btn-num">4</button>
      <button data-value="5" class="btn-num">5</button>
      <button data-value="6" class="btn-num">6</button>
      <button data-value="=" class="btn-equal">=</button>

      <button data-value="1" class="btn-num">1</button>
      <button data-value="2" class="btn-num">2</button>
      <button data-value="3" class="btn-num">3</button>

      <button data-value="0" class="btn-num col-span-2">0</button>
      <button data-value="." class="btn-num">.</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const display = document.getElementById("display");
      const lastResult = document.getElementById("lastResult");
      const buttons = document.querySelectorAll("button");

      let currentInput = "";
      let isEvaluationDone = false;

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          const value = button.getAttribute("data-value");

          if (value === "C") {
            currentInput = "";
            display.value = "";
            lastResult.textContent = "";
          } else if (value === "=") {
            if (currentInput.trim() === "") return;
            
            try {
              const result = new Function(`return ${currentInput}`)();
              const formattedResult = Number(result.toFixed(8)).toString();
              
              lastResult.textContent = `${currentInput.replace(/\*/g, "×").replace(/\//g, "÷")} =`;
              display.value = formattedResult;
              currentInput = formattedResult;
              isEvaluationDone = true;
            } catch (error) {
              display.value = "Error";
              currentInput = "";
            }
          } else {
            if (isEvaluationDone && !isNaN(value)) {
              currentInput = "";
            }
            isEvaluationDone = false;

            const lastChar = currentInput.slice(-1);
            if (["+", "-", "*", "/"].includes(value) && ["+", "-", "*", "/"].includes(lastChar)) {
              currentInput = currentInput.slice(0, -1) + value;
            } else {
              currentInput += value;
            }

            display.value = currentInput
              .replace(/\*/g, "×")
              .replace(/\//g, "÷");
          }
        });
      });
    });
  </script>

</body>
</html>
