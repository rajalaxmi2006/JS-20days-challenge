<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0f111a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .calculator-card {
      background: #1e2230;
      width: 350px;
      padding: 24px;
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid #2a2f42;
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .brand-text {
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      letter-spacing: 0.15em;
    }

    .decorations {
      display: flex;
      gap: 6px;
    }

    .indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #334155;
    }

    .display-pane {
      background-color: #0d0f17;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 24px;
      border: 1px solid #252a3c;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5);
    }

    #lastResult {
      font-size: 0.9rem;
      color: #475569;
      font-family: ui-monospace, monospace;
      text-align: right;
      min-height: 1.2rem;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #display {
      width: 100%;
      text-align: right;
      background: transparent;
      color: #ffffff;
      font-size: 2.75rem;
      font-weight: 300;
      border: none;
      outline: none;
      margin-top: 4px;
      letter-spacing: -0.02em;
    }

    #display::placeholder {
      color: #1e2230;
    }

    .button-grid {
      display: grid;
      grid-template-cols: repeat(4, 1fr);
      gap: 14px;
    }

    button {
      outline: none;
      height: 66px;
      font-size: 1.4rem;
      font-weight: 500;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.12s ease, transform 0.08s ease;
    }

    button:active {
      transform: scale(0.94);
    }

    .btn-number {
      background-color: #282e42;
      color: #f8fafc;
    }

    .btn-number:hover {
      background-color: #353d57;
    }

    .btn-clear {
      background-color: #451a1a;
      color: #f87171;
    }

    .btn-clear:hover {
      background-color: #612424;
    }

    .btn-operator {
      background-color: #45300b;
      color: #fbbf24;
    }

    .btn-operator:hover {
      background-color: #5e4210;
    }

    .btn-equal {
      background-color: #0284c7;
      color: #ffffff;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(2, 132, 199, 0.4);
    }

    .btn-equal:hover {
      background-color: #0ea5e9;
    }

    .double-width {
      grid-column: span 2;
    }
  </style>
</head>

<body>

  <div class="calculator-card">
    <div class="calculator-header">
      <span class="brand-text">ELECTRONIC</span>
      <div class="decorations">
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
        <div class="indicator-dot"></div>
      </div>
    </div>

    <div class="display-pane">
      <p id="lastResult"></p>
      <input type="text" id="display" placeholder="0" readonly />
    </div>

    <div class="button-grid">
      <button data-value="C" class="btn-clear">C</button>
      <button data-value="/" class="btn-operator">÷</button>
      <button data-value="*" class="btn-operator">×</button>
      <button data-value="-" class="btn-operator">−</button>

      <button data-value="7" class="btn-number">7</button>
      <button data-value="8" class="btn-number">8</button>
      <button data-value="9" class="btn-number">9</button>
      <button data-value="+" class="btn-operator">+</button>

      <button data-value="4" class="btn-number">4</button>
      <button data-value="5" class="btn-number">5</button>
      <button data-value="6" class="btn-number">6</button>
      <button data-value="=" class="btn-equal">=</button>

      <button data-value="1" class="btn-number">1</button>
      <button data-value="2" class="btn-number">2</button>
      <button data-value="3" class="btn-number">3</button>

      <button data-value="0" class="btn-number double-width">0</button>
      <button data-value="." class="btn-number">.</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const display = document.getElementById("display");
      const lastResult = document.getElementById("lastResult");
      const buttons = document.querySelectorAll("button");

      let currentInput = "";
      let isEvaluationDone = false;

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          const value = button.getAttribute("data-value");

          if (value === "C") {
            currentInput = "";
            display.value = "";
            lastResult.textContent = "";
          } else if (value === "=") {
            if (currentInput.trim() === "") return;
            
            try {
              const result = new Function(`return ${currentInput}`)();
              const formattedResult = Number(result.toFixed(8)).toString();
              
              lastResult.textContent = `${currentInput.replace(/\*/g, "×").replace(/\//g, "÷")} =`;
              display.value = formattedResult;
              currentInput = formattedResult;
              isEvaluationDone = true;
            } catch (error) {
              display.value = "Error";
              currentInput = "";
            }
          } else {
            if (isEvaluationDone && !isNaN(value)) {
              currentInput = "";
            }
            isEvaluationDone = false;

            const lastChar = currentInput.slice(-1);
            if (["+", "-", "*", "/"].includes(value) && ["+", "-", "*", "/"].includes(lastChar)) {
              currentInput = currentInput.slice(0, -1) + value;
            } else {
              currentInput += value;
            }

            display.value = currentInput
              .replace(/\*/g, "×")
              .replace(/\//g, "÷");
          }
        });
      });
    });
  </script>

</body>
</html>
