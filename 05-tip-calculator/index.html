<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Tip Calculator💰</h1>
      <div class="input-group">
        <label for="billAmount">Bill Amount (₹)</label>
        <input type="number" id="billAmount" placeholder="Enter bill amount" />
      </div>
      <div class="input-group">
        <label for="tipPercentage">Tip Percentage (%)</label>
        <input
          type="text"
          id="tipPercentage"
          placeholder="Enter Tip percentage"
        />
      </div>
      <div class="input-group">
        <label for="people">Number of people</label>
        <input type="number" id="people" placeholder="Enter number of people" />
      </div>
      <div class="buttons">
        <button id="calculateBtn">Calculate</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="result">
        <h3 id="tipAmount">Tip Amount: ₹0</h3>
        <h3 id="totalAmount">Total Amount: ₹0</h3>
        <h3 id="perPerson">Per Person: ₹0</h3>
      </div>
    </div>
  </body>
</html>
