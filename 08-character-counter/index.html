<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>✍️ Character Counter</h1>
      <textarea
        id="textInput"
        placeholder="Start typing here..."
        maxlength="200"
      ></textarea>
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <div class="stats">
        <div class="card">
          <h3 id="charCount">0</h3>
          <p>Characters</p>
        </div>
        <div class="card">
          <h3 id="wordCount">0</h3>
          <p>Words</p>
        </div>
        <div class="card">
          <h3 id="remaining">200</h3>
          <p>Remaining</p>
        </div>
        <div class="card">
          <h3 id="readingTime">0 Min</h3>
          <p>Read Time</p>
        </div>
      </div>
      <button id="clearBtn">Clear Text</button>
    </div>
  </body>
</html>
