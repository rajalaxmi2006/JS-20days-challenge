<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Password Generator</h2>

      <div class="result-container">
        <span id="password-display">Click Generate</span>
        <button class="btn-copy" id="copy-btn">Copy</button>
      </div>

      <div class="settings">
        <div class="setting">
          <label>Password Length (4-32)</label>
          <input type="number" id="length" min="4" max="32" value="12" />
        </div>
        <div class="setting">
          <label>Include Uppercase Letters</label>
          <input type="checkbox" id="uppercase" checked />
        </div>
        <div class="setting">
          <label>Include Lowercase Letters</label>
          <input type="checkbox" id="lowercase" checked />
        </div>
        <div class="setting">
          <label>Include Numbers</label>
          <input type="checkbox" id="numbers" checked />
        </div>
        <div class="setting">
          <label>Include Symbols</label>
          <input type="checkbox" id="symbols" checked />
        </div>
      </div>

      <button class="btn-generate" id="generate-btn">Generate Password</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
