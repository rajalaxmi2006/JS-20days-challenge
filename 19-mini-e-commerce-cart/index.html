<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase - Mini Ecommerce Cart</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">🛍️ ShopEase</div>

      <div class="cart-icon">🛒 Cart
        <span id="cartCount">0</span>
      </div>
    </nav>

    <section class="hero">
      <h1>Discover Amazing Products</h1>
      <p>Simple Ecommerce Cart Built with HTML, CSS & JavaScript</p>

      <button>Shop Now</button>
    </section>

    <section class="products-section">
      <h2>Featured Products</h2>

      <div id="products" class="products"></div>
    </section>

    <section class="cart">
      <h2>Your Shopping Cart</h2>

      <div id="cartItems">
        <p class="empty-cart">🛒 Your cart is empty</p>
      </div>

      <h3 id="totalPrice">Total: ₹0</h3>
    </section>

    <footer>
      <p>🚀 Day 19 JavaScript Challenge | Mini Ecommerce Cart</p>
    </footer>
  </body>
</html>
